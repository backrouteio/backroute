services:
  backroute-server:
    build:
      context: ./server
    container_name: backroute-server
    environment:
      BACKROUTE_TOKEN: ${BACKROUTE_TOKEN:-dev-token}
      BACKROUTE_ADDR: :8080
      BACKROUTE_SSH_ROUTES: ${BACKROUTE_SSH_ROUTES:-2222:office-ubuntu-01:127.0.0.1:22,2223:home-linux-01:127.0.0.1:22,2224:lab-linux-01:127.0.0.1:22}
    ports:
      - "8080:8080"
      - "2222:2222"
      - "2223:2223"
      - "2224:2224"
    restart: unless-stopped
