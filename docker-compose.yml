services:
  backroute-server:
    build:
      context: ./server
    container_name: backroute-server
    environment:
      BACKROUTE_TOKEN: ${BACKROUTE_TOKEN:-dev-token}
      BACKROUTE_ADDR: :8080
      BACKROUTE_DASHBOARD_USER: ${BACKROUTE_DASHBOARD_USER:-}
      BACKROUTE_DASHBOARD_PASSWORD: ${BACKROUTE_DASHBOARD_PASSWORD:-}
      BACKROUTE_SSH_ROUTES: ${BACKROUTE_SSH_ROUTES:-2222:node-1:127.0.0.1:22,2223:node-2:127.0.0.1:22,2224:node-3:127.0.0.1:22,2225:node-4:127.0.0.1:22,2226:node-5:127.0.0.1:22,2227:node-6:127.0.0.1:22,2228:node-7:127.0.0.1:22,2229:node-8:127.0.0.1:22,2230:node-9:127.0.0.1:22,2231:node-10:127.0.0.1:22}
    ports:
      - "8080:8080"
      - "2222-2231:2222-2231"
    restart: unless-stopped
