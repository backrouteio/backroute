services:
  backroute-server:
    build:
      context: ./server
    container_name: backroute-server
    environment:
      BACKROUTE_TOKEN: ${BACKROUTE_TOKEN:-dev-token}
      BACKROUTE_ADDR: :8080
      BACKROUTE_DASHBOARD_USER: ${BACKROUTE_DASHBOARD_USER:-}
      BACKROUTE_DASHBOARD_PASSWORD: ${BACKROUTE_DASHBOARD_PASSWORD:-}
      BACKROUTE_GEOIP_ENABLED: ${BACKROUTE_GEOIP_ENABLED:-true}
      BACKROUTE_PORT_START: ${BACKROUTE_PORT_START:-2222}
      BACKROUTE_PORT_END: ${BACKROUTE_PORT_END:-2999}
      BACKROUTE_SSH_ROUTES: ${BACKROUTE_SSH_ROUTES:-}
    network_mode: host
    restart: unless-stopped
