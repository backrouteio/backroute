<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BackRoute Dashboard</title>
    <link rel="stylesheet" href="/dashboard/styles.css" />
  </head>
  <body>
    <main>
      <section class="header">
        <div>
          <p>BackRoute</p>
          <h1>Agents</h1>
        </div>
        <div class="actions">
          <button id="clear-offline" class="secondary" type="button">Clear offline</button>
          <button id="refresh" type="button">Refresh</button>
        </div>
      </section>
      <form id="create-node" class="create-node">
        <label>
          Node name
          <input id="node-name" name="name" autocomplete="off" placeholder="node-1" required />
        </label>
        <label>
          SSH target
          <input id="node-target" name="target" autocomplete="off" value="127.0.0.1:22" />
        </label>
        <button type="submit">Create node</button>
      </form>
      <p id="notice" class="notice" aria-live="polite"></p>
      <section id="agents" class="agents"></section>
    </main>
    <script src="/dashboard/app.js"></script>
  </body>
</html>
